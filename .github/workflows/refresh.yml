name: Refresh Instagram token

on:
  schedule:
    - cron: "0 6 1 * *"     # 1st of every month, 06:00 UTC — well within the ~60-day expiry
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pynacl
      - name: Refresh Instagram token
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python refresh_token.py
